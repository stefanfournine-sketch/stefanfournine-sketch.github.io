<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Login Section -->
    <div id="login-section" class="section">
        <div class="login-container">
            <h1>test</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="login-error" class="error-message"></p>
            </form>
            <p class="switch-form">Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
        </div>
    </div>

    <!-- Signup Section -->
    <div id="signup-section" class="section hidden">
        <div class="login-container">
            <h1>test - Anonymous</h1>
            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-username">Name (Anonymous OK)</label>
                    <input type="text" id="signup-username" required placeholder="Choose a name" minlength="1">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required placeholder="Choose a password" minlength="3">
                </div>
                <div class="form-group">
                    <label for="signup-confirm">Confirm Password</label>
                    <input type="password" id="signup-confirm" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn btn-primary">Join</button>
                <p id="signup-error" class="error-message"></p>
            </form>
            <p class="switch-form">Already have a name? <a href="#" id="show-login">Login</a></p>
        </div>
    </div>

    <!-- Main Board Section -->
    <div id="blog-section" class="section hidden">
        <header class="board-header">
            <h1>test</h1>
            <div class="header-actions">
                <span id="welcome-message"></span>
                <button id="export-btn" class="btn btn-secondary">Export Data</button>
                <button id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>
        </header>

        <main class="board-main">
            <!-- Post Creator (4chan style) -->
            <div id="create-post-section" class="post-form-container">
                <h3>Create a Thread</h3>
                <form id="post-form">
                    <div class="form-group">
                        <label for="post-title">Subject</label>
                        <input type="text" id="post-title" required placeholder="Thread subject...">
                    </div>
                    <div class="form-group">
                        <label for="post-content">Comment</label>
                        <textarea id="post-content" rows="5" required placeholder="Type your message..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="post-file">File (optional)</label>
                        <input type="file" id="post-file">
                        <div id="file-preview" class="file-preview"></div>
                    </div>
                    <button type="submit" class="btn btn-primary">Post</button>
                </form>
            </div>

            <!-- Threads List -->
            <div class="threads-container">
                <h2>Threads</h2>
                <div id="feed-posts-list"></div>
                <p id="no-feed-posts" class="no-posts">No threads yet. Start one!</p>
            </div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
